<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview_convinient</title>
    <link rel="stylesheet" href="../static/index.css">
</head>

<body style="height: 100vw; margin: 0;">
    <div id="main_container">
        <div id="sidebar">
            <h2 class="sidebar_title">Previous Interviews</h2>
            <div id="list_previous_chats">

            </div>
        </div>

        <div id="content">
            <div class="navbar">
                <div class="InterviewBtn">
                    <button id="startInterview">Start The Interview</button>
                </div>
            </div>
            <div id="chat_message"></div>
            <footer id="footer">
                <div id="EvaluationBtn">
                    <button id="triggerEvaluation">Evaluate Responses</button>
                </div>
            </footer>
            <div id="overviewContainer" >
                <div id="heading">
                <h1 id="overviewHeading">Overview</h1>
                <img id="loading" src="../static/loading.svg" alt="" height="39px" width="45px">
                </div>
                <div class="line"></div>
                <div id="Mistakes">
                    <h2>Mistakes:</h2>
                </div>
                <div id="Rating">
                    <h2>Rating: </h2>
                </div>
                <div id="Areas_to_Improve">
                    <h2>Areas to Improve: </h2>
                </div>
                <div id="Feedback">
                    <h2> Feedback:</h2>
                </div>
            </div>
        </div>

    </div>
    <script src="../static/index.js"></script>
</body>

</html>
